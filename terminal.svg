<svg width="760" height="340" viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .mono { font-family: 'Courier New', Courier, monospace; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor { animation: blink 1.1s step-end infinite; }
  </style>
</defs>

<!-- Window background -->
<rect width="760" height="340" rx="10" fill="#0d1117"/>

<!-- Title bar -->
<rect width="760" height="38" rx="10" fill="#161b22"/>
<rect y="26" width="760" height="12" fill="#161b22"/>
<line x1="0" y1="38" x2="760" y2="38" stroke="#21262d" stroke-width="0.5"/>

<!-- Traffic lights -->
<circle cx="18" cy="19" r="5.5" fill="#ff5f57"/>
<circle cx="36" cy="19" r="5.5" fill="#ffbd2e"/>
<circle cx="54" cy="19" r="5.5" fill="#28c840"/>

<!-- Window title -->
<text class="mono" x="380" y="24" text-anchor="middle" font-size="11" fill="#484f58">anandhu@vasudev — zsh — 120×38</text>

<!-- Prompt -->
<text class="mono" x="16" y="57" font-size="11.5">
  <tspan fill="#3fb950">anandhu</tspan><tspan fill="#484f58">@</tspan><tspan fill="#58a6ff">vasudev</tspan><tspan fill="#484f58">:~$ </tspan><tspan fill="#e6edf3">neofetch</tspan>
</text>

<!-- ─── ASCII Art (Arch Linux) ─── -->
<text class="mono" x="16" y="75"  font-size="10" fill="#1e6feb">               -`</text>
<text class="mono" x="16" y="88"  font-size="10" fill="#1e6feb">              .o+`</text>
<text class="mono" x="16" y="101" font-size="10" fill="#1e6feb">             `ooo/</text>
<text class="mono" x="16" y="114" font-size="10" fill="#1e6feb">            `+oooo:</text>
<text class="mono" x="16" y="127" font-size="10" fill="#1e6feb">           `+oooooo:</text>
<text class="mono" x="16" y="140" font-size="10" fill="#1e6feb">           -+oooooo+:</text>
<text class="mono" x="16" y="153" font-size="10" fill="#1e6feb">         `/:-:++oooo+:</text>
<text class="mono" x="16" y="166" font-size="10" fill="#1e6feb">        `/++++/+++++++:</text>
<text class="mono" x="16" y="179" font-size="10" fill="#1e6feb">       `/++++++++++++++:</text>
<text class="mono" x="16" y="192" font-size="10" fill="#1e6feb">      `/+++ooooooooooooo/`</text>
<text class="mono" x="16" y="205" font-size="10" fill="#1e6feb">     ./ooosssso++osssssso+`</text>
<text class="mono" x="16" y="218" font-size="10" fill="#1e6feb">    .oossssso-    /ossssss+`</text>
<text class="mono" x="16" y="231" font-size="10" fill="#1e6feb">   -osssssso.      :ssssssso.</text>
<text class="mono" x="16" y="244" font-size="10" fill="#1e6feb">  :osssssss/        osssso+++.</text>
<text class="mono" x="16" y="257" font-size="10" fill="#1e6feb"> /ossssssss/        +ssssooo/-</text>
<text class="mono" x="16" y="270" font-size="10" fill="#1e6feb">`/ossssso+:-       -:/+osssso+-</text>
<text class="mono" x="16" y="283" font-size="10" fill="#1e6feb">`+sso+:-`             `.-/+oso:</text>
<text class="mono" x="16" y="296" font-size="10" fill="#1e6feb">`++:.                     `-/+/</text>
<text class="mono" x="16" y="309" font-size="10" fill="#1e6feb">.`                            `/</text>

<!-- ─── Info Panel ─── -->
<!-- Header -->
<text class="mono" x="228" y="75" font-size="12">
  <tspan fill="#e6edf3">anandhu</tspan><tspan fill="#484f58">@</tspan><tspan fill="#58a6ff">vasudev</tspan>
</text>

<!-- Separator -->
<text class="mono" x="228" y="89" font-size="10" fill="#21262d">─────────────────────────────────</text>

<!-- Info rows — key padded to 8 chars, ": ", value -->
<text class="mono" x="228" y="106" font-size="11"><tspan fill="#58a6ff">OS      </tspan><tspan fill="#484f58">: </tspan><tspan fill="#c9d1d9">macOS Sequoia (Arch at heart)</tspan></text>
<text class="mono" x="228" y="123" font-size="11"><tspan fill="#58a6ff">Host    </tspan><tspan fill="#484f58">: </tspan><tspan fill="#c9d1d9">MacBook Pro M3 Pro</tspan></text>
<text class="mono" x="228" y="140" font-size="11"><tspan fill="#58a6ff">Shell   </tspan><tspan fill="#484f58">: </tspan><tspan fill="#c9d1d9">zsh 5.9 + oh-my-zsh</tspan></text>
<text class="mono" x="228" y="157" font-size="11"><tspan fill="#58a6ff">Editor  </tspan><tspan fill="#484f58">: </tspan><tspan fill="#c9d1d9">VS Code · Rider · Fleet</tspan></text>
<text class="mono" x="228" y="174" font-size="11"><tspan fill="#58a6ff">Role    </tspan><tspan fill="#484f58">: </tspan><tspan fill="#3fb950">Mobile &amp; Desktop App Dev</tspan></text>
<text class="mono" x="228" y="191" font-size="11"><tspan fill="#58a6ff">Stack   </tspan><tspan fill="#484f58">: </tspan><tspan fill="#ffa657">Dart · C# · Python · JS</tspan></text>
<text class="mono" x="228" y="208" font-size="11"><tspan fill="#58a6ff">Status  </tspan><tspan fill="#484f58">: </tspan><tspan fill="#d2a8ff">Open to opportunities ✦</tspan></text>

<!-- Second separator -->
<text class="mono" x="228" y="222" font-size="10" fill="#21262d">─────────────────────────────────</text>

<!-- Color swatches -->
<rect x="228" y="230" width="18" height="11" rx="2" fill="#21262d"/>
<rect x="250" y="230" width="18" height="11" rx="2" fill="#ff5f57"/>
<rect x="272" y="230" width="18" height="11" rx="2" fill="#ffbd2e"/>
<rect x="294" y="230" width="18" height="11" rx="2" fill="#28c840"/>
<rect x="316" y="230" width="18" height="11" rx="2" fill="#58a6ff"/>
<rect x="338" y="230" width="18" height="11" rx="2" fill="#d2a8ff"/>
<rect x="360" y="230" width="18" height="11" rx="2" fill="#ffa657"/>
<rect x="382" y="230" width="18" height="11" rx="2" fill="#e6edf3"/>

<!-- Bottom prompt with blinking cursor -->
<text class="mono" x="16" y="327" font-size="11.5">
  <tspan fill="#3fb950">anandhu</tspan><tspan fill="#484f58">@</tspan><tspan fill="#58a6ff">vasudev</tspan><tspan fill="#484f58">:~$ </tspan>
</text>
<rect class="cursor" x="104" y="314" width="7" height="13" fill="#e6edf3"/>

</svg>
